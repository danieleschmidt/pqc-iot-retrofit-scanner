services:
  monitoring:
    image: prom/prometheus:latest
    ports:
    - 9090:9090
    volumes:
    - ./monitoring:/etc/prometheus
  pqc-scanner:
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    environment:
    - QUANTUM_ENHANCED=true
    - GENERATION=6
    - DEPLOYMENT_ID=gen6_prod_1756213522898_02788c7ef58dadcc
    image: terragon/pqc-iot-retrofit:gen6-latest
    ports:
    - 8080:8080
    volumes:
    - ./data:/app/data
  quantum-research:
    environment:
    - QUANTUM_QUBITS=16
    - RESEARCH_MODE=enabled
    image: terragon/quantum-research:gen6-latest
    ports:
    - 8081:8081
version: '3.8'
